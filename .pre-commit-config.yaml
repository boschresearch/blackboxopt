repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v4.2.0"
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-case-conflict

  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]
        exclude: ^blackboxopt_client/examples/
      - id: black-examples
        name: black-examples
        entry: uv run black --extend-exclude ^$ --line-length=80
        files: ^blackboxopt_client/examples/
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
      - id: ruff
        name: ruff
        entry: uv run ruff check .
        language: system
        types: [python]
